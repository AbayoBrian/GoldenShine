<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background:#0c0e12;
        color:#ffffff;
        font-family:Arial, Helvetica, sans-serif;
        text-align:center;
        padding:20px;
    }

    .container{
        max-width:600px;
    }

    h1{
        font-size:3.5rem;
        color:#E4B83E;
        margin-bottom:20px;
    }

    p{
        font-size:1.2rem;
        color:#dcdcdc;
        margin-bottom:12px;
    }

    .developer{
        color:#E4B83E;
        font-weight:bold;
        font-size:1.1rem;
    }

    @media (max-width:600px){
        h1{
            font-size:2.5rem;
        }

        p{
            font-size:1rem;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>404</h1>
    <p><strong>Page Not Found</strong></p>
    <p class="developer">Please contact the developer for more information.</p>
</div>

</body>
</html>
